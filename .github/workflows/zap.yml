name: ZAP Baseline Scan

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"
  push:
    branches: ["main"]
    paths:
      - "**/*.html"
      - "assets/**"
      - "_layouts/**"
      - "_includes/**"
      - "_config.yml"
      - ".github/workflows/zap.yml"

permissions: {}

jobs:
  zap-baseline:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: home
            target: "https://hackinbrasil.com.br/"
          - name: quero-patrocinar
            target: "https://hackinbrasil.com.br/quero-patrocinar/"
          - name: submeter-palestra
            target: "https://hackinbrasil.com.br/submeter-palestra/"

    steps:
      - name: ZAP Baseline Scan
        uses: zaproxy/action-baseline@de8ad967d3548d44ef623df22cf95c3b0baf8b25 # v0.15.0
        with:
          target: ${{ matrix.target }}
          artifact_name: zap-baseline-${{ matrix.name }}
          cmd_options: "-a"
          fail_action: false
          allow_issue_writing: false
