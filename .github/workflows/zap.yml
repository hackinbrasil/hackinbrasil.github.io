name: ZAP Baseline Scan

on:
  workflow_dispatch:
    inputs:
      target_url:
        description: "Base URL to scan"
        required: false
        default: "https://hackinbrasil.com.br"
  schedule:
    - cron: "0 6 * * 1"
  push:
    branches: ["main"]
    paths:
      - "index.html"
      - "meetup-25-03-2026.html"
      - "codigo-de-conduta.html"
      - "politica-de-privacidade.html"
      - "assets/**"
      - ".github/workflows/zap.yml"

jobs:
  zap-baseline:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Resolve target
        id: target
        run: |
          if [ -n "${{ github.event.inputs.target_url }}" ]; then
            BASE_URL="${{ github.event.inputs.target_url }}"
          else
            BASE_URL="https://hackinbrasil.com.br"
          fi
          BASE_URL="${BASE_URL%/}"
          echo "url=${BASE_URL}/" >> "$GITHUB_OUTPUT"

      - name: ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.15.0
        with:
          target: ${{ steps.target.outputs.url }}
          artifact_name: zap-baseline
          cmd_options: "-a"
          fail_action: false
          allow_issue_writing: false
