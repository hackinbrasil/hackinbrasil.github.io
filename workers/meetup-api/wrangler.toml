name = "hackinbrasil-meetup-api"
main = "src/index.js"
compatibility_date = "2026-03-07"

[[d1_databases]]
binding = "DB"
database_name = "meetup_db"
database_id = "e3d3e3e7-2ba1-47f8-a4a3-6c34bd1e7ebc"

[vars]
ALLOWED_ORIGIN = "https://hackinbrasil.com.br,https://www.hackinbrasil.com.br"
RESEND_FROM_EMAIL = "Hack in Brasil <no-reply@hackinbrasil.com.br>"
RESEND_REPLY_TO = "contato@hackinbrasil.com.br"

[triggers]
crons = ["*/2 * * * *"]

# Required secrets (set with `wrangler secret put`):
# DOC_ENCRYPTION_KEY_BASE64
# RESEND_API_KEY
